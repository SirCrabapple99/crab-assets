  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Füngiman</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    #snLoadingBG,
    #snLoadingTextHolder {
      width: 100%;
      height: 100%;
      position: absolute;
      z-index: 9998
    }

    .snLoadingText,
    body,
    html {
      overflow: hidden
    }

    #snLoadingBG {
      margin: auto;
      background-color: #0f172a
    }

    #snLoadingTextHolder {
      display: flex;
      align-items: center;
      justify-content: center
    }

    @keyframes slide {
      from {
        background-position: 0 50%
      }

      to {
        background-position: 200% 50%
      }
    }

    .snLoadingText {
      position: relative;
      display: inline-block;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      background-image: linear-gradient(90deg, oklch(.7 .25 30), oklch(.7 .25 90), oklch(.7 .25 150), oklch(.7 .25 220), oklch(.7 .25 310), oklch(.7 .25 30));
      background-size: 200% 100%;
      animation: 4s linear infinite slide;
      will-change: transform;
      transform: translateZ(0);
      text-align: center;
      font-size: 3em;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
    }

    #snLoadingText {
      position: fixed;
      margin-bottom: 20%
    }

    #snMbText {
      position: fixed;
      margin-top: 20%
    }
  </style>
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="10000" height="10000"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>
  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Brotli.loader.js";
    var config = {
      dataUrl: buildUrl + "/Brotli.data.unityweb",
      frameworkUrl: buildUrl + "/Brotli.framework.js.unityweb",
      codeUrl: buildUrl + "/Brotli.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "svinoman",
      productName: "Füngiman",
      productVersion: "2.1.0",
    };

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var mobileWarning = document.querySelector("#unity-mobile-warning");

    // By default Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      // Avoid draining fillrate performance on mobile devices,
      // and default/override low DPI mode on mobile browsers.
      config.devicePixelRatio = 1;
      mobileWarning.style.display = "block";
      setTimeout(() => {
        mobileWarning.style.display = "none";
      }, 5000);
    } else {
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";
    }
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>


  <div id="snLoadingBG"></div>
  <div id="snLoadingTextHolder">
    <div id="snLoadingText" class="snLoadingText">loading...</div>
    <div id="snMbText" class="snLoadingText">0MB / 50.62MB</div>
  </div>
  <script>const unityEl = document.getElementById("unity-loading-bar"); unityEl && (unityEl.style.visibility = "hidden");</script>
</body>

</html>
