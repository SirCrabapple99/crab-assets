<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
    <base href="https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/">
    <script>const PREFIX = "Balatro_vanilla_"; const originalOpen = indexedDB.open; const originalDeleteDatabase = indexedDB.deleteDatabase; indexedDB.open = function (name, version) { const prefixedName = PREFIX + name; return version !== undefined ? originalOpen.call(this, prefixedName, version) : originalOpen.call(this, prefixedName); }; indexedDB.deleteDatabase = function (name) { const prefixedName = PREFIX + name; return originalDeleteDatabase.call(this, prefixedName); };</script>
    <script src="love.min.js"></script>
    <title>Balatro</title>
    <style>
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        body {
            width: 100vw;
            height: 100vh;
            margin: 0px;
        }
    </style>
</head>

<body><canvas id="canvas"></canvas>
    <script>
(async () => {
    // pure slop but I forgive you
    const loadingDiv = document.createElement('div');
    loadingDiv.id = 'large-js-loader';
    loadingDiv.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); color: white; font-family: Arial, sans-serif;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        z-index: 9999; font-size: 18px;
    `;
    loadingDiv.innerHTML = `
        <div>Loading Balatro (118 MB)...</div>
        <div id="status" style="margin-top: 15px; font-size: 14px; opacity: 0.8;">Downloading game data... this might take a while</div>
    `;
    document.body.appendChild(loadingDiv);

    const chunks = [
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_aa',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ab',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ac',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ad',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ae',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_af',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ag',
        'https://cdn.jsdelivr.net/gh/SirCrabapple99/crab-assets/multifile/99000/chunk_ah'
    ];

    try {
        const parts = await Promise.all(chunks.map(url => 
            fetch(url).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
                return r.text();
            })
        ));

        const combined = parts.join('');
        const blob = new Blob([combined], { type: 'application/javascript' });
        const blobUrl = URL.createObjectURL(blob);

        const script = document.createElement('script');
        script.src = blobUrl;
        script.async = false;

        script.onload = () => {
            URL.revokeObjectURL(blobUrl);
        };

        document.head.appendChild(script);

        const waitForEngine = async () => {
            let attempts = 0;
            const maxAttempts = 600;

            while (attempts < maxAttempts) {
                if (typeof getSource === 'function' && 
                    typeof Love === 'function' && 
                    typeof canvas !== 'undefined') {

                    return true;
                }

                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            throw new Error('Engine did not initialize within 60 seconds. Check console for errors in the large JS file.');
        };

        await waitForEngine();
        const d = await getSource();

        Module = {
            INITIAL_MEMORY: 2 ** 28,
            canvas: canvas,
            printErr: console.error,
            arguments: ["game.love"]
        };

        Module.preRun = [function () {
            Module.addRunDependency("fp game.love");
            var ptr = Module.getMemory(d.length);
            Module['HEAPU8'].set(d, ptr);
            Module.FS_createDataFile('/', "game.love", d, true, true, true);
            Module.removeRunDependency("fp game.love");
        }];

        Love(Module);
        console.log('Balatro / Love2D started');
        setTimeout(() => {
            if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv);
        }, 1000);

    } catch (err) {
        console.error('Critical error:', err);
    }
})();
</script>
</body>

</html>
